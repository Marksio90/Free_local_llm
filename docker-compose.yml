version: "3.8"

# Free Local LLM – Personal AI Stack
# Uruchomienie:          docker-compose up -d
# Z GPU (NVIDIA):        docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Zatrzymanie:           docker-compose down
# Logi:                  docker-compose logs -f

services:
  # ─────────────────────────────────────────────
  # 1. Silnik LLM – Ollama
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────────
  # 2. Auto-pobieranie modeli przy starcie
  # ─────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: llm-ollama-init
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        echo '[init] Czekam na Ollama...' &&
        until curl -sf http://ollama:11434/api/tags > /dev/null; do sleep 3; done &&
        echo '[init] Pobieranie modelu czatu: ${DEFAULT_MODEL:-qwen3:4b}' &&
        ollama pull ${DEFAULT_MODEL:-qwen3:4b} &&
        echo '[init] Pobieranie modelu embeddingów: ${EMBED_MODEL:-nomic-embed-text}' &&
        ollama pull ${EMBED_MODEL:-nomic-embed-text} &&
        echo '[init] Wszystkie modele gotowe!'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # 3. Baza wektorowa – ChromaDB
  # ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: llm-chromadb
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # 4. Backend API – FastAPI
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - repos_cache:/app/repos
      - training_output:/app/training/output
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen3:4b}
      - DATA_DIR=/app/data
      - REPOS_DIR=/app/repos
      - TRAINING_OUTPUT_DIR=/app/training/output
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────
  # 5. Interfejs czatu – React (Personal AI Chat)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ollama_data:
    name: llm_ollama_data
  chroma_data:
    name: llm_chroma_data
  repos_cache:
    name: llm_repos_cache
  training_output:
    name: llm_training_output
