version: "3.8"

# Free Local LLM - pełny stos lokalnego AI
# Uruchomienie: docker compose up -d
# Z GPU (NVIDIA): docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  # ─────────────────────────────────────────────
  # 1. Silnik LLM – Ollama
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # 2. Interfejs czatu – Open WebUI
  # ─────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: llm-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-supersecret-change-me}
      - DEFAULT_MODELS=${DEFAULT_MODEL:-qwen3:4b}
      - ENABLE_RAG_WEB_SEARCH=false
    depends_on:
      ollama:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # 3. Baza wektorowa – ChromaDB
  # ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: llm-chromadb
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # 4. Backend API – FastAPI
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - repos_cache:/app/repos
      - training_output:/app/training/output
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen3:4b}
      - DATA_DIR=/app/data
      - REPOS_DIR=/app/repos
      - TRAINING_OUTPUT_DIR=/app/training/output
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # 5. Panel administracyjny – React
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend

volumes:
  ollama_data:
    name: llm_ollama_data
  open_webui_data:
    name: llm_webui_data
  chroma_data:
    name: llm_chroma_data
  repos_cache:
    name: llm_repos_cache
  training_output:
    name: llm_training_output
