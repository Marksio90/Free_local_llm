version: "3.8"

# Free Local LLM – Personal AI Stack
# Uruchomienie:   docker-compose up -d
# Z GPU:          docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Zatrzymanie:    docker-compose down
# Logi modeli:    docker-compose logs -f llm-ollama-init

services:
  # ─────────────────────────────────────────────
  # 1. Silnik LLM – Ollama
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-48h}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-8192}

  # ─────────────────────────────────────────────
  # 2. Auto-pobieranie modeli przy starcie
  #    Pętla wewnątrz sama czeka na Ollama – nie blokuje docker compose up
  # ─────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: llm-ollama-init
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        echo '[init] Czekam na Ollama...' &&
        until ollama list > /dev/null 2>&1; do sleep 5; done &&
        echo '[init] Pobieranie modelu czatu: ${DEFAULT_MODEL:-qwen3:8b}' &&
        ollama pull ${DEFAULT_MODEL:-qwen3:8b} &&
        echo '[init] Pobieranie modelu embeddingów: ${EMBED_MODEL:-nomic-embed-text}' &&
        ollama pull ${EMBED_MODEL:-nomic-embed-text} &&
        echo '[init] Wszystkie modele gotowe!'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama    # Startuje po uruchomieniu kontenera – wewnętrzna pętla czeka na API

  # ─────────────────────────────────────────────
  # 3. Baza wektorowa – ChromaDB
  # ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: llm-chromadb
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=False
      - CHROMA_PERSIST_DIRECTORY=/data

  # ─────────────────────────────────────────────
  # 4. Backend API – FastAPI
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - repos_cache:/app/repos
      - training_output:/app/training/output
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen3:8b}
      - DATA_DIR=/app/data
      - REPOS_DIR=/app/repos
      - TRAINING_OUTPUT_DIR=/app/training/output
    depends_on:
      - ollama
      - chromadb

  # ─────────────────────────────────────────────
  # 5. Interfejs czatu – React
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend

volumes:
  ollama_data:
    name: llm_ollama_data
  chroma_data:
    name: llm_chroma_data
  repos_cache:
    name: llm_repos_cache
  training_output:
    name: llm_training_output
